name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump version and stamp changelog
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          python3 - <<'PY'
          import datetime, os, re
          from pathlib import Path

          bump = os.environ["BUMP"]

          # --- Bump pyproject.toml version ---
          pyproject = Path("pyproject.toml")
          text = pyproject.read_text()
          m = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"\s*$', text, flags=re.M)
          if not m:
              raise SystemExit("Could not parse version from pyproject.toml")

          major, minor, patch = map(int, m.groups())
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          pyproject.write_text(re.sub(
              r'^version\s*=\s*"\d+\.\d+\.\d+"\s*$',
              f'version = "{new_version}"',
              text, count=1, flags=re.M,
          ))

          # --- Stamp changelog: [Unreleased] -> [X.Y.Z] - date ---
          changelog = Path("CHANGELOG.md")
          if changelog.exists():
              cl = changelog.read_text()
              today = datetime.date.today().isoformat()
              cl = re.sub(
                  r'^## \[Unreleased\]\s*$',
                  f'## [Unreleased]\n\n## [{new_version}] - {today}',
                  cl, count=1, flags=re.M,
              )
              changelog.write_text(cl)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_version={new_version}\n")

          print(f"Bumped to {new_version}")
          PY

      - name: Validate changelog entry
        run: |
          chmod +x scripts/check_changelog_entry.sh
          ./scripts/check_changelog_entry.sh "${{ steps.bump.outputs.new_version }}"

      - name: Commit, tag, and push
        env:
          RELEASE_BYPASS_TOKEN: ${{ secrets.RELEASE_BYPASS_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore(release): v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"

          git remote set-url origin "https://x-access-token:${RELEASE_BYPASS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git push --atomic origin HEAD:refs/heads/main "refs/tags/v${NEW_VERSION}"
