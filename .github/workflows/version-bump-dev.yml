name: version-bump-dev

on:
  push:
    branches: [dev]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: version-bump-dev
  cancel-in-progress: false

jobs:
  bump:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          persist-credentials: false

      - name: Determine semver bump from merged PR label
        id: semver
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            let pr = prs.data.find(p => p.base?.ref === 'dev' && p.merged_at);

            // Fallback for cases where commit-to-PR association is temporarily missing.
            if (!pr) {
              const commit = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: sha,
              });
              const message = commit.data.commit?.message || "";

              // Merge commit: "Merge pull request #123 ..."
              // Squash merge title: "... (#123)"
              const m =
                message.match(/Merge pull request #(\d+)/i) ||
                message.match(/\(#(\d+)\)\s*$/m);

              if (m) {
                const prNum = Number(m[1]);
                const resp = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNum,
                });
                const candidate = resp.data;
                if (candidate.base?.ref === 'dev' && candidate.merged_at) {
                  pr = candidate;
                }
              }
            }

            if (!pr) {
              core.setFailed(`No merged PR associated with commit ${sha} into dev.`);
              return;
            }

            const labels = pr.labels.map(l => l.name);
            const semver = labels.filter(name => /^semver:(major|minor|patch)$/.test(name));

            if (semver.length !== 1) {
              core.setFailed(
                `Merged PR #${pr.number} must have exactly one semver label. Found ${semver.length}. Labels: ${labels.join(', ') || '<none>'}`
              );
              return;
            }

            const bump = semver[0].split(':')[1];
            core.setOutput('bump', bump);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_title', pr.title);
            core.info(`Resolved bump=${bump} from PR #${pr.number}`);

      - name: Bump version + update changelog
        env:
          BUMP: ${{ steps.semver.outputs.bump }}
          PR_NUMBER: ${{ steps.semver.outputs.pr_number }}
          PR_TITLE: ${{ steps.semver.outputs.pr_title }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations
          import datetime as dt
          import os
          import re
          from pathlib import Path

          bump = os.environ["BUMP"]
          pr_number = os.environ.get("PR_NUMBER", "")
          pr_title = os.environ.get("PR_TITLE", "")
          if bump not in {"major", "minor", "patch"}:
              raise SystemExit(f"Invalid bump: {bump}")

          pyproject = Path("pyproject.toml")
          text = pyproject.read_text()
          m = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"\s*$', text, flags=re.M)
          if not m:
              raise SystemExit("Could not find [tool.poetry] version in pyproject.toml")

          major, minor, patch = map(int, m.groups())
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          new_text = re.sub(
              r'^version\s*=\s*"\d+\.\d+\.\d+"\s*$',
              f'version = "{new_version}"',
              text,
              count=1,
              flags=re.M,
          )
          pyproject.write_text(new_text)

          changelog = Path("CHANGELOG.md")
          today = dt.date.today().isoformat()
          entry = (
              f"## {new_version} - {today}\n\n"
              f"- Bump: **{bump}**\n"
              f"- Source PR: #{pr_number} {pr_title}\n\n"
          )

          if changelog.exists():
              cl = changelog.read_text()
              if cl.startswith("#"):
                  lines = cl.splitlines(keepends=True)
                  lines.insert(1, "\n" + entry)
                  changelog.write_text("".join(lines))
              else:
                  changelog.write_text("# Changelog\n\n" + entry + cl)
          else:
              changelog.write_text("# Changelog\n\n" + entry)

          print(f"new_version={new_version}")
          PY

      - name: Commit and push bump
        env:
          BUMP: ${{ steps.semver.outputs.bump }}
          RELEASE_BYPASS_TOKEN: ${{ secrets.RELEASE_BYPASS_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No version changes detected; exiting."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          NEW_VERSION=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path("pyproject.toml").read_text()
          m = re.search(r'^version\s*=\s*"(\d+\.\d+\.\d+)"\s*$', text, flags=re.M)
          print(m.group(1) if m else "unknown")
          PY
          )
          git commit -m "chore(release): bump version to ${NEW_VERSION} [skip ci]"
          if [ -n "${RELEASE_BYPASS_TOKEN}" ]; then
            git remote set-url origin "https://x-access-token:${RELEASE_BYPASS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          # Remove any auth header injected by checkout so remote URL token is used.
          git config --local --unset-all http.https://github.com/.extraheader || true
          git pull --rebase origin dev
          git push origin HEAD:dev
