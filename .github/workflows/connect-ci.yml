name: connect-ci

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "tt_connect/**"
      - "tests/**"
      - "docs_site/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/connect-ci.yml"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  require_single_semver_label:
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate semver label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const semver = labels.filter(name => /^semver:(major|minor|patch)$/.test(name));

            if (semver.length !== 1) {
              core.setFailed(
                `PRs into dev must have exactly one semver label: semver:major | semver:minor | semver:patch. Found: ${semver.length}. Labels: ${labels.join(", ") || "<none>"}`
              );
              return;
            }

            core.info(`Semver label OK: ${semver[0]}`);

  lint_type:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install --with dev

      - name: Ruff
        run: make lint

      - name: MyPy
        run: make typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install --with dev

      - name: Run Unit + Integration Tests
        run: make test

  coverage_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install --with dev

      - name: Coverage Gate
        run: make coverage

      - name: Upload Coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  package_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Validate Metadata
        run: poetry check

      - name: Build Package
        run: poetry build

      - name: Upload Dist Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  docs_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install --with dev

      - name: Install MkDocs Tooling
        run: poetry run pip install mkdocs pymdown-extensions

      - name: Strict MkDocs Build
        run: make docs-build
