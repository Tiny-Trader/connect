name: semver-label-gate

on:
  pull_request_target:
    branches: [dev]
    types: [opened, reopened, synchronize, labeled, unlabeled, ready_for_review]

permissions:
  pull-requests: read

jobs:
  require_single_semver_label:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const semver = labels.filter(name => /^semver:(major|minor|patch)$/.test(name));

            if (semver.length !== 1) {
              core.setFailed(
                `PRs into dev must have exactly one semver label: semver:major | semver:minor | semver:patch. Found: ${semver.length}. Labels: ${labels.join(", ") || "<none>"}`
              );
              return;
            }

            core.info(`Semver label OK: ${semver[0]}`);
