name: publish-main

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -q "origin/main"; then
            echo "Tag commit ${GITHUB_SHA} is not on origin/main"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Validate tag matches pyproject version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          import os

          tag = os.environ["TAG"]
          if not tag.startswith("v"):
            raise SystemExit(f"Tag must start with v, got: {tag}")
          tag_ver = tag[1:]

          text = Path("pyproject.toml").read_text()
          m = re.search(r'^version\s*=\s*"(\d+\.\d+\.\d+)"\s*$', text, flags=re.M)
          if not m:
            raise SystemExit("Could not read version from pyproject.toml")
          pkg_ver = m.group(1)

          if pkg_ver != tag_ver:
            raise SystemExit(f"Version mismatch: tag={tag_ver}, pyproject={pkg_ver}")

          print(f"Version validated: {pkg_ver}")
          PY

      - name: Install dependencies
        run: poetry install --with dev

      - name: Quality gates
        run: make ci

      - name: Build package
        run: poetry build

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
